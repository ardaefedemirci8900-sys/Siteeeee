<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcas | Eyüp Taşkın Premium Footwear</title>
    <style>
        :root {
            --accent-color: #cda434; 
            --card-bg: rgba(17, 17, 17, 0.9); 
            --font-main: 'Poppins', sans-serif;
            --text-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-main); 
            background-color: #050505; 
            color: var(--text-color); 
            scroll-behavior: smooth;
            background-image: url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=1920'); 
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: -1;
        }

        header {
            padding: 30px 20px; 
            display: flex; 
            justify-content: center; /* Logoyu ortalar */
            align-items: center;
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 1000; 
            background: rgba(5, 5, 5, 0.9); 
            border-bottom: 2px solid var(--accent-color);
            backdrop-filter: blur(10px);
        }

        .logo { 
            font-size: 32px; 
            font-weight: 800; 
            letter-spacing: 6px; 
            color: var(--accent-color); 
            text-transform: uppercase;
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
        }

        .modal-card { background: #111; border: 1px solid var(--accent-color); padding: 30px; width: 90%; max-width: 400px; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; color: #555; cursor: pointer; background:none; border:none; }
        .btn-buy { width: 100%; padding: 12px; background: var(--accent-color); border: none; font-weight: 700; cursor: pointer; color: #000; display: block; margin-top: 20px; text-align: center; font-size: 16px; }

        .catalog { padding: 150px 20px 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .item-card { background: var(--card-bg); padding: 15px; border: 1px solid #222; transition: 0.4s; cursor: pointer; border-radius: 12px; }
        .item-card:hover { border-color: var(--accent-color); transform: translateY(-10px); box-shadow: 0 15px 40px rgba(205, 164, 52, 0.2); }

        .img-box { width: 100%; height: 260px; background: #000; margin-bottom: 15px; overflow: hidden; border-radius: 8px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .price { font-weight: 700; font-size: 20px; color: var(--accent-color); margin-top: 10px; display: block; }

        .contact { padding: 80px 20px; text-align: center; background: rgba(8, 8, 8, 0.95); border-top: 2px solid var(--accent-color); }
        .contact h3 { color: var(--accent-color); margin-bottom: 25px; letter-spacing: 2px; }
        .contact-links a { display: block; font-size: 18px; color: #fff; margin-bottom: 15px; text-decoration: none; transition: 0.3s; }
        .contact-links a:hover { color: var(--accent-color); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="modal-overlay" id="productModal">
        <div class="modal-card">
            <button class="close-btn" onclick="toggleModal('productModal')">✕</button>
            <img id="mImg" src="" style="width:100%; height:200px; object-fit:cover; margin-bottom:15px; border:1px solid #222;">
            <h3 id="mTitle" style="color:var(--accent-color); margin-bottom:10px;"></h3>
            <p id="mDesc" style="font-size:13px; color:#aaa; line-height:1.5;"></p>
            <span id="mPrice" class="price" style="font-size:24px;"></span>
            <a href="https://www.facebook.com/share/1CfR2syHv6/" target="_blank" class="btn-buy">SATIŞ İÇİN FACEBOOK'A GİT</a>
        </div>
    </div>

    <header>
        <div class="logo">MARCAS</div>
    </header>

    <section class="catalog">
        <div class="grid" id="product-list"></div>
    </section>

    <section class="contact">
        <h3>İLETİŞİM VE SİPARİŞ</h3>
        <div class="contact-links">
            <p style="font-size:22px; margin-bottom:15px;"><strong>Eyüp Taşkın</strong></p>
            <a href="https://www.facebook.com/share/1CfR2syHv6/" target="_blank">Facebook Sayfamız</a>
            <a href="tel:+393356369924">Tel: +39 335 6369924</a>
        </div>
    </section>

    <script>
        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        const products = [
            { name: "Marcas Black Velvet", desc: "Premium süet doku ve el işçiliği dikişler.", price: "5.800 TL", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600" },
            { name: "Marcas Gold Elite", desc: "Hakiki deri üzerine altın yansımalı elit tasarım.", price: "6.500 TL", img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=600" },
            { name: "Marcas Pure White", desc: "Leke tutmaz İtalyan deri, asil beyazlık.", price: "4.900 TL", img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=600" },
            { name: "Marcas Midnight", desc: "Gece şıklığı için tasarlanmış derin siyah seri.", price: "5.200 TL", img: "https://images.unsplash.com/photo-1514989940723-e8e51635b782?q=80&w=600" },
            { name: "Marcas Executive", desc: "Klasik ve modernin elit buluşması.", price: "5.900 TL", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjjbeA25Qffl852VAgpYYEpU5cZUeZvFmDrq6gdSDBwQ&s=10" }, // 5. Düzeltildi
            { name: "Marcas Stealth Pro", desc: "Fark edilmeyen mat gizem, üstün konfor.", price: "4.800 TL", img: "https://images.unsplash.com/photo-1539185441755-769473a23570?q=80&w=600" },
            { name: "Marcas Ocean Blue", desc: "Premium deri ve ferah dinamik mavi tonları.", price: "4.700 TL", img: "https://images.unsplash.com/photo-1515955656352-a1fa3ffcd111?q=80&w=600" },
            { name: "Marcas Desert Storm", desc: "Nubuk deri detaylı zorlu şartlar için elit tasarım.", price: "4.300 TL", img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?q=80&w=600" },
            { name: "Marcas Red Line", desc: "Cesur adımlar için premium kırmızı detay.", price: "4.500 TL", img: "https://static.ticimax.cloud/38914/uploads/urunresimleri/buyuk/spor-ayakkabiaere-bej-desenli-kadin-sp-19-a3e.jpg" }, // 9. Düzeltildi
            { name: "Marcas Legacy", desc: "Klasik Marcas ruhunu taşıyan elit deri seri.", price: "6.100 TL", img: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?q=80&w=600" },
            { name: "Marcas Urban Ghost", desc: "Şehir hayatı için ultra hafif ve esnek yapı.", price: "3.700 TL", img: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?q=80&w=600" },
            { name: "Marcas Aero Lite", desc: "Nefes alabilen elit dokuma teknoloji.", price: "3.400 TL", img: "https://images.unsplash.com/photo-1551107696-a4b0c5a0d9a2?q=80&w=600" },
            { name: "Marcas Sport Elite", desc: "Spor ve şıklığı birleştiren premium tasarım.", price: "4.950 TL", img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?q=80&w=600" },
            { name: "Marcas Grey Mist", desc: "Nötr tonlarda zamansız zarafet, mat gri.", price: "4.150 TL", img: "https://images.unsplash.com/photo-1491553895911-0055eca6402d?q=80&w=600" },
            { name: "Marcas Brown Lux", desc: "Kahverengi premium nubuk, özel işçilik.", price: "5.300 TL", img: "https://images.unsplash.com/photo-1551107696-a4b0c5a0d9a2?q=80&w=812&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" }, // 15. Düzeltildi
            { name: "Marcas Dark Knight", desc: "Buzlu metal detaylı derin siyah deri.", price: "5.650 TL", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=600" }, // 16. Düzeltildi
            { name: "Marcas Silver Stream", desc: "Metalik gümüş detaylı modern elit tasarım.", price: "5.800 TL", img: "https://images.unsplash.com/photo-1514989940723-e8e51635b782?q=80&w=600" },
            { name: "Marcas Sky Walker", desc: "Hafiflik ve konforun buluştuğu premium seri.", price: "3.900 TL", img: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=600" },
            { name: "Marcas Ivory Elite", desc: "Fildişi tonlarında asil ve yumuşak deri.", price: "6.200 TL", img: "https://images.unsplash.com/photo-1605348532760-6753d2c43329?q=80&w=600" }, // 19. Düzeltildi
            { name: "Marcas Vanguard", desc: "Geleceğin mirasını taşıyan cesur elit tasarım.", price: "6.400 TL", img: "https://images.unsplash.com/photo-1562183241-b937e95585b6?q=80&w=600" }
        ];

        const list = document.getElementById('product-list');
        products.forEach((p, index) => {
            list.innerHTML += `
                <div class="item-card" onclick="openMe(${index})">
                    <div class="img-box"><img src="${p.img}"></div>
                    <h3 style="font-size:16px;">${p.name}</h3>
                    <span class="price">${p.price}</span>
                </div>
            `;
        });

        function openMe(i) {
            const p = products[i];
            document.getElementById('mImg').src = p.img;
            document.getElementById('mTitle').innerText = p.name;
            document.getElementById('mDesc').innerText = p.desc;
            document.getElementById('mPrice').innerText = p.price;
            toggleModal('productModal');
        }
    </script>
</body>
</html>
